<section class="about-contacto">
  <div class="contacto-inner">

    <!-- Columna izquierda: datos de contacto -->
    <div class="contacto-info">
      <div class="section-label">Contacto</div>
      <h2 class="section-title" style="margin-bottom: 24px;">Visítanos o<br><span style="color: var(--color-primary)">llámanos</span></h2>

      <!-- Lista de datos de contacto -->
      <div class="contacto-lista">
        <div class="contacto-item">
          <span class="contacto-icono">📍</span>
          <div>
            <strong>Dirección</strong>
            <p>San Marcelino Champagnat<br>Tizayuca, Hidalgo, México</p>
          </div>
        </div>
        <div class="contacto-item">
          <span class="contacto-icono">📞</span>
          <div>
            <strong>Teléfono</strong>
            <p><a href="tel:+525512345678">55 1234 5678</a></p>
          </div>
        </div>
        <div class="contacto-item">
          <span class="contacto-icono">💬</span>
          <div>
            <strong>WhatsApp</strong>
            <p><a href="https://wa.me/525512345678" target="_blank">Escríbenos al 55 31 30 52 77</a></p>
          </div>
        </div>
        <div class="contacto-item">
          <span class="contacto-icono">🕐</span>
          <div>
            <strong>Horario</strong>
            <p>Lunes a Domingo: 8:30 am – 10:30 pm</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Columna derecha: mapa Google Maps -->
    <div class="mapa-wrap">
      <iframe 
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6025.123456789!2d-98.951148!3d19.849214!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f17!3m3!1m2!1s0x85d1f92d12345678%3A0xabcdef123456789!2s19%C2%B050'57.2%22N%2098%C2%B057'04.1%22W!5e0!3m2!1ses!2smx!4v1714829876543!5m2!1ses!2smx" 
        width="100%" 
        height="400" 
        style="border:0;" 
        allowfullscreen="" 
        loading="lazy" 
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>

    <!-- Columna derecha: formulario de contacto con Formspree -->
    <form class="contact-form reveal-right" id="contactForm"
          action="https://formspree.io/f/xojyovle"
          method="POST">

      <div class="form-row">
        <div class="form-group">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="tu@email.com" required />
        </div>
      </div><!-- /form-row -->

      <div class="form-group">
        <label for="asunto">Asunto</label>
        <input type="text" id="asunto" name="asunto" placeholder="¿En qué te podemos ayudar?" required />
      </div>

      <div class="form-group">
        <label for="mensaje">Mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escríbenos..." required></textarea>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Enviar Mensaje</button>

      <div class="form-success" id="formSuccess">
        ✅ ¡Mensaje enviado! Te contactaremos pronto.
      </div>

    </form><!-- /contact-form -->

    <!-- Imagen de Almo hablando por teléfono — columna derecha del formulario -->
    <div class="contacto-almo-wrap">
      <img src="./images/almo_escucha.png" alt="Almo escuchándote" class="contacto-almo-img">
    </div>

  </div>
</section>
