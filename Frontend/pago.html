<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abarrotes Almiux â€” Pago</title>

  <link rel="icon" href="images/ICONO_ALMOO.png" type="image/png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=DM+Sans:wght@400;500&display=swap"
    rel="stylesheet">

  <!-- Hoja de estilos principal -->
  <link rel="stylesheet" href="styles.css">

  <!-- Iconos -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

  <!-- Header dinĂ¡mico -->
  <div id="navbar-container"></div>

  <!-- SecciĂ³n de Pago -->
  <section class="pago">
    <h1>Finalizar compra</h1>
    <p>Completa tus datos para procesar el pago de manera segura.</p>

    <form id="pago-form" class="pago-form">
      <!-- Datos personales -->
      <div class="form-group">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" name="nombre" required>
      </div>

      <div class="form-group">
        <label for="correo">Correo electrĂ³nico</label>
        <input type="email" id="correo" name="correo" required>
      </div>

      <div class="form-group">
        <label for="direccion">DirecciĂ³n de entrega</label>
        <input type="text" id="direccion" name="direccion" required>
      </div>

      <!-- Datos de tarjeta -->
      <div class="form-group">
        <label for="tarjeta">NĂºmero de tarjeta</label>
        <input type="text" id="tarjeta" name="tarjeta" maxlength="16" required>
      </div>

      <div class="form-group">
        <label for="exp">Fecha de expiraciĂ³n (MM/AA)</label>
        <input type="text" id="exp" name="exp" placeholder="MM/AA" required>
      </div>

      <div class="form-group">
        <label for="cvv">CVV</label>
        <input type="text" id="cvv" name="cvv" maxlength="3" required>
      </div>

      <button type="submit" class="btn-primary">Pagar ahora</button>
    </form>
  </section>

  <!-- Footer dinĂ¡mico -->
  <div id="footer-container"></div>

  <!-- Scripts -->
  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/navbar.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/productos.js"></script>
  <script src="js/main.js"></script>
  <script src="js/carrito.js"></script>

  <!-- ValidaciĂ³n bĂ¡sica -->
  <script>
    document.getElementById("pago-form").addEventListener("submit", async function (e) {
      e.preventDefault();

      const nombre    = document.getElementById("nombre").value.trim();
      const correo    = document.getElementById("correo").value.trim();
      const direccion = document.getElementById("direccion").value.trim();
      const tarjeta   = document.getElementById("tarjeta").value.trim();
      const exp       = document.getElementById("exp").value.trim();
      const cvv       = document.getElementById("cvv").value.trim();

      if (nombre.length < 3)                              { alert("El nombre debe tener al menos 3 caracteres."); return; }
      if (!/^[^@]+@[^@]+\.[a-zA-Z]{2,}$/.test(correo))  { alert("Ingresa un correo electrĂ³nico vĂ¡lido."); return; }
      if (direccion.length < 5)                           { alert("La direcciĂ³n debe ser mĂ¡s detallada."); return; }
      if (!/^\d{16}$/.test(tarjeta))                      { alert("El nĂºmero de tarjeta debe tener 16 dĂ­gitos."); return; }
      if (!/^(0[1-9]|1[0-2])\/\d{2}$/.test(exp))         { alert("La fecha de expiraciĂ³n debe estar en formato MM/AA."); return; }
      if (!/^\d{3}$/.test(cvv))                           { alert("El CVV debe tener 3 dĂ­gitos."); return; }

      /* Leer carrito y sesiĂ³n */
      let carrito = [];
      try { carrito = JSON.parse(localStorage.getItem('almiux_carrito')) || []; } catch(_) {}
      const sesion = (() => { try { return JSON.parse(sessionStorage.getItem('almiux_sesion')); } catch(_) { return null; } })();

      const total = carrito.reduce((s, i) => s + (i.precio * (i.qty ?? i.cantidad ?? 1)), 0);

      /* Intentar guardar el pedido en el backend */
      try {
        const usuarioId = sesion?.id;
        if (!usuarioId) throw new Error('Sin sesiĂ³n');

        const pedido = await PedidosAPI.create({
          estatus:          'PENDIENTE',
          total:            parseFloat(total.toFixed(2)),
          direccionEntrega: direccion,
          notas:            `Nombre: ${nombre} | Email: ${correo}`,
          fechaPedido:      new Date().toISOString(),
          user:             { id: usuarioId },
        });

        /* Crear los detalles del pedido */
        await Promise.all(carrito.map(item =>
          DetallesAPI.create(pedido.idPedido ?? pedido.id, {
            nombreProducto: item.nombre,
            cantidad:       item.qty ?? item.cantidad ?? 1,
            precioUnitario: item.precio,
          })
        ));
      } catch(_) {
        /* Backend no disponible â€” solo limpia carrito localmente */
      }

      /* Limpiar carrito */
      localStorage.removeItem('almiux_carrito');

      alert("Â¡Pedido realizado correctamente! Gracias por tu compra.");
      window.location.href = obtenerBasePath() + 'home.html';
    });
  </script>
</body>
</html>
